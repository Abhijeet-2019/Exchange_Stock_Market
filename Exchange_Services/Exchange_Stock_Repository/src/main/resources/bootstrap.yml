server:
  port: 8082
  forward-headers-strategy: framework
app:
  kafka:
    enabled: true

spring:
  application:
    name: stock-repo-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/Stock_Exchange_API

  kafka:
    bootstrap-servers: "localhost:9092"
    consumer.group-id: "stockDetail-group"
    template:
      stockDetails-topic: "stock-details-topic"
  cloud:
    config:
      uri: http://localhost:8888
      fail-fast: true
eureka:
  client:
    service-url:
      defaultZone: "http://localhost:8761/eureka"
    register-with-eureka: true
    fetch-registry: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

  swagger-ui:
    enabled: false
    doc-expansion: none

management:
  tracing:
    sampling:
      probability: 1.0   # start with 100%, reduce in prod
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
#      endpoint: http://zipkin:9411/api/v2/spans

logging:
  pattern:
    level: "%5p [${spring.application.name:},traceId=%X{traceId},spanId=%X{spanId}]"