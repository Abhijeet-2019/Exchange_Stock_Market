server:
  port: 8085
  forward-headers-strategy: framework

spring:
  application:
    name: user-service
  cloud:
    config:
      uri: http://localhost:8888
      fail-fast: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    url: jdbc:mysql://localhost:3306/User_Service
    password: root
  jpa:
    show-sql: true
    properties:
      hibernate:
        globally_quoted_identifiers_skip_column_definitions: 'true'
        globally_quoted_identifiers: 'true'
        dialect: org.hibernate.dialect.MySQLDialect
    hibernate:
      format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/Stock_Exchange_API
eureka:
  client:
    service-url:
      defaultZone: "http://localhost:8761/eureka"
    register-with-eureka: true
    fetch-registry: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

  swagger-ui:
    enabled: false
    doc-expansion: none

#logging:
#  level:
#    org:
#      springframework:
#        web:
#          reactive:
#            function:
#              client: DEBUG
#    reactor:
#      netty:
#        http:
#          client: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      serviceBBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 3          # Check the last 10 calls
        failureRateThreshold: 2        # Open if 5 or more (50%) fail
        waitDurationInOpenState: 15s   # Wait 10s before trying again
        permittedNumberOfCallsInHalfOpenState: 1 #

management:
  tracing:
    sampling:
      probability: 1.0   # start with 100%, reduce in prod
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
#      endpoint: http://zipkin:9411/api/v2/spans

logging:
  pattern:
    level: "%5p [${spring.application.name:},traceId=%X{traceId},spanId=%X{spanId}]"